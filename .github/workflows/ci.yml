name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Required by AppConfig::from_env() — tests will panic without these
  JWT_SECRET: ci-test-secret-change-me
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: admin123

jobs:
  # ── Rust: test + clippy ─────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Create minimal frontend dist (required by rust-embed)
        run: mkdir -p frontend/dist && echo '<!doctype html><html><body></body></html>' > frontend/dist/index.html

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test integration

      - name: Run cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Frontend: test + build ─────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build