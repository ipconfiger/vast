# IM Server — Nginx reverse proxy configuration
#
# Place this file at /etc/nginx/sites-available/im-server and symlink
# to /etc/nginx/sites-enabled/, or include directly in nginx.conf.
#
# Adjust server_name, ssl_certificate paths, and listen ports as needed.

upstream im_server_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name im.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name im.example.com;

    # --- TLS configuration ---
    ssl_certificate     /etc/ssl/certs/im-server.crt;
    ssl_certificate_key /etc/ssl/private/im-server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Security headers ---
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-XSS-Protection        "0"           always;

    # --- Client limits ---
    client_max_body_size 50m;

    # --- API / WebSocket proxy ---
    location / {
        proxy_pass http://im_server_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket: allow long-lived connections
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_buffering       off;

        # Increase buffer for header-heavy auth tokens
        proxy_buffer_size    4k;
        proxy_buffers        8 16k;
    }

    # --- Deny access to dot-files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
